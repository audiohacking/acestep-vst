# Build and release acestep-vst plugins for all supported platforms.
# Bundles the matching pre-built acestep.cpp binaries from audiohacking/acestep.cpp.
name: Build and release plugins

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload artifacts to (e.g. v1.0.0). Leave empty to skip upload.'
        required: false
        type: string

# Version of the acestep.cpp pre-built binaries to bundle
env:
  ACESTEP_RELEASE: v0.0.3

permissions:
  contents: write

jobs:
  # ── macOS — AU + VST3 ────────────────────────────────────────────────────────
  build-macos:
    name: Release · macOS (AU + VST3)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Set compiler environment
        run: |
          echo "CC=/usr/bin/clang" >> $GITHUB_ENV
          echo "CXX=/usr/bin/clang++" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          cmake -B build -G Xcode \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --config Release -- -quiet

      - name: Locate plugin artefacts
        id: artefacts
        run: |
          set -e
          AU=$(find build -name "acestep-vst.component" -type d 2>/dev/null | head -1)
          VST3=$(find build -name "acestep-vst.vst3" -type d 2>/dev/null | head -1)
          [ -n "$AU" ]   || AU=$(find build -name "*.component" -type d 2>/dev/null | head -1)
          [ -n "$VST3" ] || VST3=$(find build -name "*.vst3" -type d 2>/dev/null | head -1)
          echo "au_path=$AU" >> $GITHUB_OUTPUT
          echo "vst3_path=$VST3" >> $GITHUB_OUTPUT
          echo "Found AU:   $AU"
          echo "Found VST3: $VST3"
          if [ -z "$AU" ] || [ -z "$VST3" ]; then
            echo "Plugin artefacts not found. Build tree:"
            find build -type d \( -name "*.component" -o -name "*.vst3" \) 2>/dev/null || true
            exit 1
          fi

      - name: Stage plugin bundles
        run: |
          mkdir -p release-artefacts
          cp -R "${{ steps.artefacts.outputs.au_path }}"   release-artefacts/acestep-vst.component
          cp -R "${{ steps.artefacts.outputs.vst3_path }}" release-artefacts/acestep-vst.vst3

      - name: Download and embed acestep.cpp binaries (macOS)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/acestep
          gh release download "$ACESTEP_RELEASE" \
            --repo audiohacking/acestep.cpp \
            --pattern "acestep-macos-arm64-metal.tar.gz" \
            --dir /tmp/acestep
          cd /tmp/acestep && tar xzf acestep-macos-arm64-metal.tar.gz

          # Embed binaries inside each bundle's MacOS directory so the plugin
          # finds them automatically without any Settings configuration
          for BUNDLE_BIN in \
            "release-artefacts/acestep-vst.component/Contents/MacOS" \
            "release-artefacts/acestep-vst.vst3/Contents/MacOS"; do
            cp /tmp/acestep/ace-lm /tmp/acestep/ace-synth "$BUNDLE_BIN/"
            # Copy shared dylibs (needed at runtime)
            find /tmp/acestep -maxdepth 1 -name "*.dylib" -exec cp {} "$BUNDLE_BIN/" \;
            chmod +x "$BUNDLE_BIN/ace-lm" "$BUNDLE_BIN/ace-synth"
          done

      - name: Codesign plugin bundles
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          IDENTITY="${MACOS_SIGNING_IDENTITY:--}"
          echo "Signing with identity: $IDENTITY"
          for BUNDLE in \
            release-artefacts/acestep-vst.component \
            release-artefacts/acestep-vst.vst3; do
            if [ "$IDENTITY" = "-" ]; then
              xcrun codesign --force --sign - --deep "$BUNDLE"
            else
              xcrun codesign --force --sign "$IDENTITY" \
                --options runtime --timestamp --deep "$BUNDLE"
            fi
          done
          cd release-artefacts && \
            zip -r "AcestepVST-macOS-AU-VST3.zip" \
              "acestep-vst.component" "acestep-vst.vst3" && \
            cd ..

      - name: Build macOS installer (.pkg)
        run: |
          mkdir -p payload/Library/Audio/Plug-Ins/Components
          mkdir -p payload/Library/Audio/Plug-Ins/VST3
          cp -R release-artefacts/acestep-vst.component \
                payload/Library/Audio/Plug-Ins/Components/
          cp -R release-artefacts/acestep-vst.vst3 \
                payload/Library/Audio/Plug-Ins/VST3/
          pkgbuild \
            --root payload \
            --identifier com.audiohacking.acestep-vst \
            --version 0.1.0 \
            --install-location / \
            release-artefacts/AcestepVST-macOS-Installer.pkg

      - name: Codesign installer (.pkg)
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_INSTALLER_SIGNING_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGNING_IDENTITY }}
        run: |
          IDENTITY="${MACOS_INSTALLER_SIGNING_IDENTITY:-$MACOS_SIGNING_IDENTITY}"
          IDENTITY="${IDENTITY:--}"
          if [ "$IDENTITY" != "-" ] && [ -n "$IDENTITY" ]; then
            mv release-artefacts/AcestepVST-macOS-Installer.pkg \
               release-artefacts/AcestepVST-macOS-Installer-unsigned.pkg
            productsign --sign "$IDENTITY" --timestamp \
              release-artefacts/AcestepVST-macOS-Installer-unsigned.pkg \
              release-artefacts/AcestepVST-macOS-Installer.pkg
            rm release-artefacts/AcestepVST-macOS-Installer-unsigned.pkg
          fi

      - name: Upload release assets
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ (github.event_name == 'release' && github.event.release.tag_name) || inputs.release_tag }}
          files: |
            release-artefacts/AcestepVST-macOS-AU-VST3.zip
            release-artefacts/AcestepVST-macOS-Installer.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artefacts (non-release)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: AcestepVST-macOS-plugins
          path: release-artefacts/

  # ── Linux — VST3 ─────────────────────────────────────────────────────────────
  build-linux:
    name: Release · Linux (VST3)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install JUCE system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libfreetype6-dev libfontconfig1-dev \
            libasound2-dev libgl1-mesa-dev \
            ninja-build

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --config Release

      - name: Locate VST3 artefact
        id: artefacts
        run: |
          set -e
          VST3=$(find build -name "acestep-vst.vst3" -type d 2>/dev/null | head -1)
          [ -n "$VST3" ] || VST3=$(find build -name "*.vst3" -type d 2>/dev/null | head -1)
          echo "vst3_path=$VST3" >> $GITHUB_OUTPUT
          echo "Found VST3: $VST3"
          [ -n "$VST3" ] || (echo "VST3 not found" && exit 1)

      - name: Stage plugin bundle
        run: |
          mkdir -p release-artefacts
          cp -R "${{ steps.artefacts.outputs.vst3_path }}" release-artefacts/acestep-vst.vst3

      - name: Download and embed acestep.cpp binaries (Linux)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/acestep
          gh release download "$ACESTEP_RELEASE" \
            --repo audiohacking/acestep.cpp \
            --pattern "acestep-linux-x64.tar.gz" \
            --dir /tmp/acestep
          cd /tmp/acestep && tar xzf acestep-linux-x64.tar.gz

          BUNDLE_BIN="release-artefacts/acestep-vst.vst3/Contents/x86_64-linux"
          cp /tmp/acestep/ace-lm /tmp/acestep/ace-synth "$BUNDLE_BIN/"
          find /tmp/acestep -maxdepth 1 -name "*.so" -exec cp {} "$BUNDLE_BIN/" \;
          chmod +x "$BUNDLE_BIN/ace-lm" "$BUNDLE_BIN/ace-synth"

      - name: Create release archive
        run: |
          cd release-artefacts && \
            tar czf AcestepVST-Linux-VST3.tar.gz acestep-vst.vst3 && \
            cd ..

      - name: Upload release assets
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ (github.event_name == 'release' && github.event.release.tag_name) || inputs.release_tag }}
          files: release-artefacts/AcestepVST-Linux-VST3.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artefacts (non-release)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: AcestepVST-Linux-VST3
          path: release-artefacts/

  # ── Windows — VST3 ───────────────────────────────────────────────────────────
  build-windows:
    name: Release · Windows (VST3)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: |
          cmake --build build --config Release

      - name: Locate VST3 artefact
        id: artefacts
        shell: bash
        run: |
          set -e
          VST3=$(find build -name "acestep-vst.vst3" -type d 2>/dev/null | head -1)
          [ -n "$VST3" ] || VST3=$(find build -name "*.vst3" -type d 2>/dev/null | head -1)
          echo "vst3_path=$VST3" >> $GITHUB_OUTPUT
          echo "Found VST3: $VST3"
          [ -n "$VST3" ] || (echo "VST3 not found" && exit 1)

      - name: Stage plugin bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-artefacts | Out-Null
          Copy-Item -Recurse "${{ steps.artefacts.outputs.vst3_path }}" `
                    release-artefacts\acestep-vst.vst3

      - name: Download and embed acestep.cpp binaries (Windows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path C:\temp\acestep | Out-Null
          gh release download "$env:ACESTEP_RELEASE" `
            --repo audiohacking/acestep.cpp `
            --pattern "acestep-windows-x64.zip" `
            --dir C:\temp\acestep
          Expand-Archive -Path "C:\temp\acestep\acestep-windows-x64.zip" `
                         -DestinationPath "C:\temp\acestep\extracted"

          $BinSrc  = "C:\temp\acestep\extracted"
          $BinDest = "release-artefacts\acestep-vst.vst3\Contents\x86_64-win"
          Copy-Item "$BinSrc\ace-lm.exe","$BinSrc\ace-synth.exe" $BinDest
          # Copy runtime DLLs bundled with the release
          Get-ChildItem "$BinSrc\*.dll" | Copy-Item -Destination $BinDest -ErrorAction SilentlyContinue

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path release-artefacts\acestep-vst.vst3 `
                           -DestinationPath release-artefacts\AcestepVST-Windows-VST3.zip

      - name: Upload release assets
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ (github.event_name == 'release' && github.event.release.tag_name) || inputs.release_tag }}
          files: release-artefacts/AcestepVST-Windows-VST3.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artefacts (non-release)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: AcestepVST-Windows-VST3
          path: release-artefacts/
